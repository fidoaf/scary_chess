<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Chess</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="title-row">
            <button id="settings-btn" class="icon-btn" type="button" aria-label="Open settings" title="Settings">
                <svg class="gear-icon" viewBox="0 0 64 64" aria-hidden="true" focusable="false" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="8" y1="16" x2="56" y2="16"/>
                    <line x1="8" y1="32" x2="56" y2="32"/>
                    <line x1="8" y1="48" x2="56" y2="48"/>
                    <circle cx="40" cy="16" r="5"/>
                    <circle cx="20" cy="32" r="5"/>
                    <circle cx="34" cy="48" r="5"/>
                </svg>
            </button>
            <h1>Scary Chess</h1>
            <div id="connection-status" class="connection-status hidden" role="status" aria-live="polite"></div>
        </div>
        <div class="game-info">
            <div id="turn-indicator">White's Turn</div>
            <div id="status"></div>
        </div>
        <div class="board-area">
            <div class="board-wrapper">
                <div class="rank-labels">
                    <span>8</span><span>7</span><span>6</span><span>5</span>
                    <span>4</span><span>3</span><span>2</span><span>1</span>
                </div>
                <div>
                    <div id="board" class="board"></div>
                    <div class="file-labels">
                        <span>a</span><span>b</span><span>c</span><span>d</span>
                        <span>e</span><span>f</span><span>g</span><span>h</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="captured">
            <div class="captured-group">
                <span class="captured-label">Captured by White:</span>
                <div id="captured-white" class="captured-pieces"></div>
            </div>
            <div class="captured-group">
                <span class="captured-label">Captured by Black:</span>
                <div id="captured-black" class="captured-pieces"></div>
            </div>
        </div>
        <div class="controls">
            <button id="new-game-btn">New Game</button>
            <button id="undo-btn">Undo</button>
            <button id="play-together-btn">Play Together</button>
        </div>
    </div>

    <div id="share-modal" class="modal hidden">
        <div class="modal-content">
            <button class="modal-close-btn" id="close-share-modal-btn" aria-label="Close">&times;</button>
            <h2>Play Together</h2>
            <p>Share this link with your opponent:</p>
            <div id="share-link-display"></div>
            <div class="share-actions">
                <button id="copy-link-btn">Copy Link</button>
                <button id="share-link-btn">Share...</button>
            </div>
            <div id="share-fallback-actions" class="share-actions hidden">
                <a id="share-email-link" class="share-action-link" href="#">Email</a>
                <a id="share-whatsapp-link" class="share-action-link" href="#" target="_blank" rel="noopener noreferrer">WhatsApp</a>
            </div>
            <div id="waiting-msg">Waiting for opponent to join...</div>
        </div>
    </div>

    <div id="promotion-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Promote Pawn</h2>
            <div id="promotion-choices" class="promotion-choices"></div>
        </div>
    </div>

    <div id="settings-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <div class="modal-content settings-content">
            <button class="modal-close-btn" id="close-settings-btn" type="button" aria-label="Close">&times;</button>
            <h2 id="settings-title">Settings</h2>
            <label class="setting-row" for="reload-protection-toggle">
                <span>Prevent page reloading</span>
                <input id="reload-protection-toggle" type="checkbox" checked>
            </label>
            <fieldset class="settings-section" aria-label="Theme selection">
                <legend>Theme</legend>
                <label class="setting-option" for="theme-classic">
                    <input id="theme-classic" type="radio" name="theme" value="classic-chess">
                    <span>Classic chess</span>
                </label>
                <label class="setting-option" for="theme-scary">
                    <input id="theme-scary" type="radio" name="theme" value="scary-minecraft" checked>
                    <span>Scary Minecraft</span>
                </label>
            </fieldset>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script src="chess.js"></script>
</body>
</html>
